id: gcc
version: "13"
os: ubuntu-22
steps:
  - name: Install gcc 13
    packages:
      - gcc-13
      - g++-13
  - name: Set as default compiler
    run:
      - update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
      - update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
addons:
  - gdb:14
  - valgrind:3
