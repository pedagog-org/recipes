id: rust
version: "1.79"
os: ubuntu-22
steps:
  - name: Install Rust 1.79 via rustup
    run:
      - curl -fsSL https://sh.rustup.rs -o /tmp/rustup-init.sh
      - |
        RUSTUP_HOME=/usr/local/rustup CARGO_HOME=/usr/local/cargo \
        sh /tmp/rustup-init.sh -y --default-toolchain 1.79.0 --profile minimal --no-modify-path
      - rm /tmp/rustup-init.sh
      - RUSTUP_HOME=/usr/local/rustup CARGO_HOME=/usr/local/cargo /usr/local/cargo/bin/rustup component add clippy rustfmt
      - echo 'export PATH=/usr/local/cargo/bin:$PATH' > /etc/profile.d/rust.sh
